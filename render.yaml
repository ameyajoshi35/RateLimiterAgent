services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: ratelimiter-agent-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false          # set to your frontend URL, e.g. https://ratelimiter-agent.onrender.com

  # ── Frontend (React / Vite static site) ───────────────────────────────────
  - type: web
    name: ratelimiter-agent-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # set to your backend URL, e.g. https://ratelimiter-agent-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # SPA fallback
